version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # Group dependencies by update type
    groups:
      dependencies:
        patterns:
          - "*"
    # Allow automatic updates for minor/patch versions
    versioning-strategy: increase
    # Ignore major version updates that may have breaking changes
    ignore:
      - dependency-name: "@modelcontextprotocol/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pdfjs-dist"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@napi-rs/canvas"
        update-types: ["version-update:semver-major"]
    # Labels for Dependabot PRs
    labels:
      - "dependencies"
      - "dependabot"
    # Commit message prefix
    commit-message:
      prefix: "deps"
      include: "scope"
